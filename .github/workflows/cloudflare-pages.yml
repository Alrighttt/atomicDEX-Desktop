# Builds KDF WASM from GPL-2.0 source, builds the Flutter web app, and
# deploys to Cloudflare Pages.
#
# Cloudflare supports custom headers, so we CAN use the --wasm Dart build
# for better performance. The _headers file sets COOP/COEP.
name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Checkout KDF (GPL-2.0)
        uses: actions/checkout@v4
        with:
          repository: ComputerGenieCo/dex-framework
          ref: GPL2
          path: kdf-src

      - name: Cache KDF build
        uses: actions/cache@v4
        with:
          path: kdf-src/target
          key: kdf-wasm-${{ hashFiles('kdf-src/Cargo.lock') }}
          restore-keys: kdf-wasm-

      - name: Build KDF WASM
        timeout-minutes: 30
        run: |
          cd kdf-src
          wasm-pack build --release mm2src/mm2_bin_lib --target web --out-dir ../../target/target-wasm-release

      - name: Copy KDF WASM into wallet
        run: |
          KDF_DEST=sdk/packages/komodo_defi_framework/web/kdf/bin
          mkdir -p "$KDF_DEST"
          cp kdf-src/target/target-wasm-release/kdflib_bg.wasm "$KDF_DEST/"
          cp kdf-src/target/target-wasm-release/kdflib.js "$KDF_DEST/"

      - name: Clean
        run: |
          flutter clean
          rm -rf build/*

      - name: Generate assets (first build)
        timeout-minutes: 20
        env:
          GITHUB_API_PUBLIC_READONLY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flutter pub get || true
          flutter build web --release --wasm --csp --no-web-resources-cdn \
            --dart-define=ANALYTICS_DISABLED=true \
            --dart-define=COMMIT_HASH=$(git rev-parse --short HEAD) \
            --dart-define=BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%MZ') \
            || true
          find build -mindepth 1 -maxdepth 1 ! -name 'native_assets' -exec rm -rf {} + 2>/dev/null || true

      - name: Build web (second build)
        timeout-minutes: 20
        env:
          GITHUB_API_PUBLIC_READONLY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flutter pub get
          flutter build web --release --wasm --csp --no-web-resources-cdn \
            --dart-define=ANALYTICS_DISABLED=true \
            --dart-define=COMMIT_HASH=$(git rev-parse --short HEAD) \
            --dart-define=BUILD_DATE=$(date -u '+%Y-%m-%dT%H:%MZ')

      - name: Copy Cloudflare config
        run: |
          cp web/_headers build/web/_headers
          cp web/_redirects build/web/_redirects

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME || 'gleec-wallet' }}
